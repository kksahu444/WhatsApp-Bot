services:
  redis:
    ports:
      - "6379:6379"
  backend:
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend # hot reload: dev only
      - lancedb_data:/app/data/lancedb
      - logs_data:/app/logs
  dashboard:
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app # hot reload: dev only
      - lancedb_data:/app/data/lancedb:ro
